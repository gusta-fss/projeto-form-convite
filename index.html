<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festivite</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Open+Sans:wght@300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles/index.css">
</head>

<body>
    <div id="app">
        <aside>
            <div class="aside-container">
                <header>
                    <img id="icon" src="./assets/icons/Logo.svg" alt="icone de lança confete">
                    <img id="logo" src="./assets/Festivite Logo.svg" alt="logo Festivite">
                    <h2>Crie um convite digital para o seu evento</h2>
                </header>
            </div>
        </aside>
        <main>
            <div class="main-container">
                <header>
                    <h1>Crie seu convite</h1>
                </header>

                <form action="">
                    <fieldset class="about">
                        <legend>
                            <img src="./assets/icons/calendar.svg" alt="icone de calendario">
                            Sobre o evento
                        </legend>

                        <div class="input-wrapper">
                            <label for="title">Título</label>
                            <input type="text" name="title" id="title" placeholder="Nome do evento">
                        </div>

                        <div class="grid-info">
                            <div class="input-wrapper">
                                <label for="start-date">Início</label>
                                <input type="datetime-local" name="start-date" id="start-date"
                                    onclick="this.showPicker()">
                            </div>
                            <div class="input-wrapper">
                                <label for="end-date">Fim</label>
                                <input type="datetime-local" name="end-date" id="end-date" onclick="this.showPicker()">
                            </div>

                            <div class="input-wrapper">
                                <label for="">Tipo</label>

                                <div id="event-type-radio">
                                    <div class="event-type-radio-inner">
                                        <input type="radio" name="event-type" value="in-person" id="in-person">
                                        <label for="in-person">
                                            <div id="radio-img-in-person"></div>
                                            <span>Presencial</span>
                                        </label>
                                    </div>
                                    <div class="event-type-radio-inner">
                                        <input type="radio" name="event-type" value="online" id="online">
                                        <label for="online">
                                            <div id="radio-img-online"></div>
                                            <span>Online</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="input-wrapper">
                                <label for="place">Local</label>
                                <input type="url" name="place" id="place" placeholder="Link ou endereço">
                            </div>
                        </div>

                        <div class="textarea-wrapper">
                            <label for="description">Descrição</label>
                            <textarea name="description" id="description" cols="30" rows="5"
                                placeholder="Escreva sobre os detalhes do evento."></textarea>
                        </div>
                    </fieldset>

                    <fieldset class="personalization">
                        <legend>
                            <img src="./assets/icons/paintbrush-vertical.svg" alt="icone de pincel">
                            Personalização
                        </legend>

                        <div class="radio-wrapper">
                            <label for="">Cor principal</label>

                            <div id="main-color-radio">
                                <div class="color-event-type-radio-inner" style="--main-color-radio: #59B2FF;">
                                    <input type="radio" name="main-color" value="#59B2FF" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #6A59FF;">
                                    <input type="radio" name="main-color" value="#6A59FF" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #B259FF;">
                                    <input type="radio" name="main-color" value="#B259FF" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #FF59F9;">
                                    <input type="radio" name="main-color" value="#FF59F9" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #FF598B;">
                                    <input type="radio" name="main-color" value="#FF598B" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #FF5959;">
                                    <input type="radio" name="main-color" value="#FF5959" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #FF8B59;">
                                    <input type="radio" name="main-color" value="#FF8B59" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #FFCD59;">
                                    <input type="radio" name="main-color" value="#FFCD59" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #E1FF59;">
                                    <input type="radio" name="main-color" value="#E1FF59" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #59FF91;">
                                    <input type="radio" name="main-color" value="#59FF91" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #59FFF9;">
                                    <input type="radio" name="main-color" value="#59FFF9" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                            </div>
                        </div>
                    </fieldset>
                </form>
            </div>
        </main>
    </div>
</body>

</html>
