<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festivite</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Open+Sans:wght@300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles/index.css">
</head>

<body>
    <div id="app">
        <aside>
            <div class="aside-container">
                <header>
                    <img id="icon" src="./assets/icons/Logo.svg" alt="icone de lança confete">
                    <img id="logo" src="./assets/Festivite Logo.svg" alt="logo Festivite">
                    <h2>Crie um convite digital para o seu evento</h2>
                </header>
            </div>
        </aside>

        <main>
            <div class="main-container">
                <header>
                    <h1>Crie seu convite</h1>
                </header>

                <form action="">
                    <fieldset class="about">
                        <legend>
                            <img src="./assets/icons/calendar.svg" alt="icone de calendario">
                            Sobre o evento
                        </legend>

                        <div class="input-wrapper">
                            <label for="title">Título</label>
                            <input type="text" name="title" id="title" placeholder="Nome do evento">
                        </div>

                        <div class="grid-info">
                            <div class="input-wrapper">
                                <label for="start-date">Início</label>
                                <input type="datetime-local" name="start-date" id="start-date"
                                    onclick="this.showPicker()">
                            </div>
                            <div class="input-wrapper">
                                <label for="end-date">Fim</label>
                                <input type="datetime-local" name="end-date" id="end-date" onclick="this.showPicker()">
                            </div>

                            <div class="input-wrapper">
                                <label>Tipo</label>

                                <div id="event-type-radio">
                                    <div class="event-type-radio-inner">
                                        <input type="radio" name="event-type" value="in-person" id="in-person" checked>
                                        <label for="in-person">
                                            <div id="radio-img-in-person"></div>
                                            <span>Presencial</span>
                                        </label>
                                    </div>
                                    <div class="event-type-radio-inner">
                                        <input type="radio" name="event-type" value="online" id="online">
                                        <label for="online">
                                            <div id="radio-img-online"></div>
                                            <span>Online</span>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="input-wrapper">
                                <label for="place">Local</label>
                                <input type="url" name="place" id="place" placeholder="Link ou endereço">
                            </div>
                        </div>

                        <div class="textarea-wrapper">
                            <label for="description">Descrição</label>
                            <textarea name="description" id="description" cols="30" rows="5"
                                placeholder="Escreva sobre os detalhes do evento."></textarea>
                        </div>
                    </fieldset>

                    <fieldset class="personalization">
                        <legend>
                            <img src="./assets/icons/paintbrush-vertical.svg" alt="icone de pincel">
                            Personalização
                        </legend>

                        <div class="radio-wrapper">
                            <label>Cor principal</label>

                            <div id="main-color-radio">
                                <div class="color-radio-inner" style="--main-color-radio: #59B2FF;">
                                    <input type="radio" name="main-color" value="#59B2FF" id="main-color" checked>
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #6A59FF;">
                                    <input type="radio" name="main-color" value="#6A59FF" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #B259FF;">
                                    <input type="radio" name="main-color" value="#B259FF" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #FF59F9;">
                                    <input type="radio" name="main-color" value="#FF59F9" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #FF598B;">
                                    <input type="radio" name="main-color" value="#FF598B" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #FF5959;">
                                    <input type="radio" name="main-color" value="#FF5959" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #FF8B59;">
                                    <input type="radio" name="main-color" value="#FF8B59" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #FFCD59;">
                                    <input type="radio" name="main-color" value="#FFCD59" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #E1FF59;">
                                    <input type="radio" name="main-color" value="#E1FF59" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #59FF91;">
                                    <input type="radio" name="main-color" value="#59FF91" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                                <div class="color-radio-inner" style="--main-color-radio: #59FFF9;">
                                    <input type="radio" name="main-color" value="#59FFF9" id="main-color">
                                    <div class="color-option"></div>
                                </div>
                            </div>
                        </div>

                        <div class="radio-wrapper">
                            <label>Tema do evento</label>

                            <div id="event-theme-radio">
                                <div class="theme-radio-inner">
                                    <input type="radio" name="event-theme" value="Aniversário" id="theme-niver" checked>
                                    <label for="theme-niver">
                                        <img src="./assets/themes/img-aniversario.svg"
                                            alt="imagem de festa de aniversario">
                                        <span>Aniversário</span>
                                    </label>
                                </div>
                                <div class="theme-radio-inner">
                                    <input type="radio" name="event-theme" value="Infantil" id="theme-infant">
                                    <label for="theme-infant">
                                        <img src="./assets/themes/img-infantil.svg" alt="imagem de festa infantil">
                                        <span>Infantil</span>
                                    </label>
                                </div>
                                <div class="theme-radio-inner">
                                    <input type="radio" name="event-theme" value="Formatura" id="theme-formatura">
                                    <label for="theme-formatura">
                                        <img src="./assets/themes/img-formatura.svg" alt="imagem de formatura">
                                        <span>Formatura</span>
                                    </label>
                                </div>
                                <div class="theme-radio-inner">
                                    <input type="radio" name="event-theme" value="Casamento" id="theme-niver">
                                    <label for="theme-casamento">
                                        <img src="./assets/themes/img-casamento.svg" alt="imagem de alianças">
                                        <span>Casamento</span>
                                    </label>
                                </div>
                                <div class="theme-radio-inner">
                                    <input type="radio" name="event-theme" value="Chá de bebê" id="theme-bebe">
                                    <label for="theme-bebe">
                                        <img src="./assets/themes/img-cha.svg" alt="imagem de fralda">
                                        <span>Chá de bebê</span>
                                    </label>
                                </div>
                                <div class="theme-radio-inner">
                                    <input type="radio" name="event-theme" value="Chá de Panela" id="theme-cozinha">
                                    <label for="theme-cozinha">
                                        <img src="./assets/themes/img-cozinha.svg" alt="imagem de cozinha">
                                        <span>Chá de Panela</span>
                                    </label>
                                </div>
                                <div class="theme-radio-inner">
                                    <input type="radio" name="event-theme" value="Carnaval" id="theme-carnaval">
                                    <label for="theme-carnaval">
                                        <img src="./assets/themes/img-carnaval.svg" alt="imagem de carnaval">
                                        <span>Carnaval</span>
                                    </label>
                                </div>
                                <div class="theme-radio-inner">
                                    <input type="radio" name="event-theme" value="Páscoa" id="theme-pascoa">
                                    <label for="theme-pascoa">
                                        <img src="./assets/themes/img-pascoa.svg" alt="imagem de pascoa">
                                        <span>Páscoa</span>
                                    </label>
                                </div>
                                <div class="theme-radio-inner">
                                    <input type="radio" name="event-theme" value="São João" id="theme-junino">
                                    <label for="theme-junino">
                                        <img src="./assets/themes/img-junina.svg" alt="imagem de bandeiras juninas">
                                        <span>São João</span>
                                    </label>
                                </div>
                                <div class="theme-radio-inner">
                                    <input type="radio" name="event-theme" value="Halloween" id="theme-halloween">
                                    <label for="theme-halloween">
                                        <img src="./assets/themes/img-hallowen.svg" alt="imagem de halloween">
                                        <span>Halloween</span>
                                    </label>
                                </div>
                                <div class="theme-radio-inner">
                                    <input type="radio" name="event-theme" value="Natal" id="theme-natal">
                                    <label for="theme-natal">
                                        <img src="./assets/themes/img-natal.svg" alt="imagem de presente">
                                        <span>Natal</span>
                                    </label>
                                </div>
                                <div class="theme-radio-inner">
                                    <input type="radio" name="event-theme" value="Outro" id="theme-outro">
                                    <label for="theme-outro">
                                        <img src="./assets/themes/img-outro.svg" alt="imagem de festa">
                                        <span>Outro</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="style-switch-container">
                            <label>Estilo</label>

                            <div id="switch-wrapper">
                                <input type="radio" name="style" id="dark" value="dark" checked>
                                <input type="radio" name="style" id="light" value="light">

                                <div class="switch-pill">
                                    <span class="ball"></span>
                                </div>

                                <span class="style-text"></span>
                            </div>
                        </div>
                    </fieldset>
                </form>
            </div>
        </main>
    </div>
</body>

</html>festa de aniversar
